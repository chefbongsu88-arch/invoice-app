[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm@9.12.0 && pnpm install --frozen-lockfile && npx expo export --platform web && pnpm build"

[deploy]
startCommand = "pnpm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
